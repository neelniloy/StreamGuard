<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>StreamGuard IPTV Player</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
            },
            colors: {
              slate: {
                750: '#2d3748', // Custom shade between 700 and 800
                950: '#020617',
              }
            }
          },
        },
      }
    </script>
    <style>
      /* Custom Scrollbar */
      .custom-scrollbar::-webkit-scrollbar {
        width: 6px;
      }
      .custom-scrollbar::-webkit-scrollbar-track {
        background: #0f172a; 
      }
      .custom-scrollbar::-webkit-scrollbar-thumb {
        background: #334155; 
        border-radius: 3px;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb:hover {
        background: #475569; 
      }
      body {
        background-color: #020617;
        color: white;
      }

      /* Android TV / Keyboard Navigation Focus Styles */
      :focus-visible {
        outline: 3px solid #6366f1; /* Indigo-500 */
        outline-offset: 2px;
        z-index: 50;
        border-radius: 4px;
      }
      
      /* Ensure list items get proper focus highlighting */
      button:focus-visible {
        background-color: rgba(99, 102, 241, 0.2);
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "lucide-react": "https://esm.sh/lucide-react@^0.563.0",
    "react/": "https://esm.sh/react@^19.2.4/",
    "react": "https://esm.sh/react@^19.2.4",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "hls.js": "https://esm.sh/hls.js@^1.6.15"
  }
}
</script>
</head>
  <body>
    <div id="root"></div>
  </body>
</html>
